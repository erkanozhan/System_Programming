<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" font-family="sans-serif">
  <rect width="680" height="240" fill="#1e1e2e" rx="8"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold">Uzak Yönetim (Remote Management) — WinRM</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="ra" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#89b4fa"/>
    </marker>
    <marker id="ra2" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#a6e3a1"/>
    </marker>
  </defs>

  <!-- Local machine -->
  <rect x="20" y="85" width="175" height="80" fill="#181825" rx="6" stroke="#89b4fa" stroke-width="2"/>
  <text x="107" y="110" text-anchor="middle" fill="#89b4fa" font-size="11" font-weight="bold">Yerel Makine</text>
  <text x="107" y="128" text-anchor="middle" fill="#cdd6f4" font-size="9.5" font-family="monospace">Enter-PSSession</text>
  <text x="107" y="144" text-anchor="middle" fill="#cdd6f4" font-size="9.5" font-family="monospace">Invoke-Command</text>

  <!-- WinRM protocol arrow 1 (to server 1) -->
  <line x1="195" y1="108" x2="370" y2="85" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ra)"/>

  <!-- WinRM protocol arrow 2 (to server 2) -->
  <line x1="195" y1="125" x2="370" y2="135" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ra)"/>

  <!-- WinRM protocol arrow 3 (to server 3) -->
  <line x1="195" y1="142" x2="370" y2="187" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ra)"/>

  <!-- WinRM label on arrow 2 -->
  <text x="282" y="118" text-anchor="middle" fill="#89b4fa" font-size="10" font-weight="bold">WinRM</text>
  <text x="282" y="131" text-anchor="middle" fill="#585b70" font-size="9">TCP 5985 (HTTP)</text>
  <text x="282" y="143" text-anchor="middle" fill="#585b70" font-size="9">TCP 5986 (HTTPS)</text>

  <!-- Remote server 1 -->
  <rect x="370" y="48" width="155" height="52" fill="#181825" rx="6" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="447" y="68" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="bold">Sunucu-1</text>
  <text x="447" y="86" text-anchor="middle" fill="#585b70" font-size="9">192.168.1.10</text>

  <!-- Remote server 2 -->
  <rect x="370" y="112" width="155" height="52" fill="#181825" rx="6" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="447" y="132" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="bold">Sunucu-2</text>
  <text x="447" y="150" text-anchor="middle" fill="#585b70" font-size="9">192.168.1.11</text>

  <!-- Remote server 3 -->
  <rect x="370" y="176" width="155" height="52" fill="#181825" rx="6" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="447" y="196" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="bold">Sunucu-N</text>
  <text x="447" y="214" text-anchor="middle" fill="#585b70" font-size="9">...</text>

  <!-- Bottom note -->
  <text x="340" y="235" text-anchor="middle" fill="#45475a" font-size="9">Enter-PSSession: tek sunucuyla etkileşimli oturum · Invoke-Command: birden fazla sunucuya aynı anda komut</text>
</svg>
