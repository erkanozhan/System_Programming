<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 240" font-family="sans-serif">
  <rect width="580" height="240" fill="#1e1e2e" rx="8"/>
  <text x="290" y="26" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold">Zamanlanmış Görev Bileşenleri (Scheduled Task)</text>

  <defs>
    <marker id="ta" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#585b70"/>
    </marker>
  </defs>

  <!-- Trigger box -->
  <rect x="30" y="48" width="200" height="90" fill="#181825" rx="6" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="130" y="68" text-anchor="middle" fill="#f9e2af" font-size="11" font-weight="bold">Tetikleyici (Trigger)</text>
  <text x="130" y="68" text-anchor="middle" fill="#f9e2af" font-size="11" font-weight="bold">Tetikleyici (Trigger)</text>
  <line x1="48" y1="75" x2="212" y2="75" stroke="#313244" stroke-width="1"/>
  <text x="130" y="92" text-anchor="middle" fill="#cdd6f4" font-size="10" font-family="monospace">New-ScheduledTaskTrigger</text>
  <text x="130" y="109" text-anchor="middle" fill="#585b70" font-size="9.5">Haftalık · Pazartesi · 05:00</text>
  <text x="130" y="126" text-anchor="middle" fill="#585b70" font-size="9">Ne zaman çalışacak?</text>

  <!-- Action box -->
  <rect x="350" y="48" width="200" height="90" fill="#181825" rx="6" stroke="#fab387" stroke-width="1.5"/>
  <text x="450" y="68" text-anchor="middle" fill="#fab387" font-size="11" font-weight="bold">Eylem (Action)</text>
  <line x1="368" y1="75" x2="532" y2="75" stroke="#313244" stroke-width="1"/>
  <text x="450" y="92" text-anchor="middle" fill="#cdd6f4" font-size="10" font-family="monospace">New-ScheduledTaskAction</text>
  <text x="450" y="109" text-anchor="middle" fill="#585b70" font-size="9.5">PowerShell.exe · health.ps1</text>
  <text x="450" y="126" text-anchor="middle" fill="#585b70" font-size="9">Ne çalıştırılacak?</text>

  <!-- Arrows from boxes to Register -->
  <line x1="130" y1="138" x2="130" y2="165" stroke="#585b70" stroke-width="1.2"/>
  <line x1="130" y1="165" x2="236" y2="165" stroke="#585b70" stroke-width="1.2" marker-end="url(#ta)"/>

  <line x1="450" y1="138" x2="450" y2="165" stroke="#585b70" stroke-width="1.2"/>
  <line x1="450" y1="165" x2="346" y2="165" stroke="#585b70" stroke-width="1.2" marker-end="url(#ta)"/>

  <!-- Register-ScheduledTask box -->
  <rect x="155" y="150" width="270" height="62" fill="#313244" rx="6" stroke="#a6e3a1" stroke-width="2"/>
  <text x="290" y="172" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="bold">Register-ScheduledTask</text>
  <text x="290" y="190" text-anchor="middle" fill="#cdd6f4" font-size="10" font-family="monospace">-TaskName "HealthCheckTask"</text>
  <text x="290" y="205" text-anchor="middle" fill="#585b70" font-size="9">Görevi Görev Zamanlayıcı'ya kaydeder</text>

  <!-- Bottom note -->
  <text x="290" y="228" text-anchor="middle" fill="#45475a" font-size="9">Tetikleyici + Eylem birleşimi → tek bir kayıtlı görev oluşturur</text>
</svg>
