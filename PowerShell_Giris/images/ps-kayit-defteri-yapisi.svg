<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 250" font-family="Consolas, 'Courier New', monospace">
  <rect width="660" height="250" fill="#1e1e2e" rx="8"/>

  <!-- Title -->
  <text x="330" y="26" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold" font-family="sans-serif">Kayıt Defteri Yol Yapısı (Registry Key Path)</text>

  <!-- Hive -->
  <rect x="20" y="44" width="92" height="30" fill="#181825" rx="4" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="66" y="64" text-anchor="middle" fill="#f38ba8" font-size="11" font-weight="bold">HKCU</text>

  <!-- Connector lines horizontal -->
  <line x1="112" y1="59" x2="136" y2="59" stroke="#585b70" stroke-width="1.2"/>
  <!-- Software -->
  <rect x="136" y="44" width="88" height="30" fill="#181825" rx="4" stroke="#fab387" stroke-width="1"/>
  <text x="180" y="64" text-anchor="middle" fill="#fab387" font-size="10">Software</text>

  <line x1="224" y1="59" x2="248" y2="59" stroke="#585b70" stroke-width="1.2"/>
  <!-- Microsoft -->
  <rect x="248" y="44" width="88" height="30" fill="#181825" rx="4" stroke="#fab387" stroke-width="1"/>
  <text x="292" y="64" text-anchor="middle" fill="#fab387" font-size="10">Microsoft</text>

  <line x1="336" y1="59" x2="360" y2="59" stroke="#585b70" stroke-width="1.2"/>
  <!-- Windows -->
  <rect x="360" y="44" width="80" height="30" fill="#181825" rx="4" stroke="#fab387" stroke-width="1"/>
  <text x="400" y="64" text-anchor="middle" fill="#fab387" font-size="10">Windows</text>

  <line x1="440" y1="59" x2="464" y2="59" stroke="#585b70" stroke-width="1.2"/>
  <!-- CurrentVersion -->
  <rect x="464" y="44" width="118" height="30" fill="#181825" rx="4" stroke="#fab387" stroke-width="1"/>
  <text x="523" y="64" text-anchor="middle" fill="#fab387" font-size="10">CurrentVersion</text>

  <!-- Down arrow to Run -->
  <line x1="523" y1="74" x2="523" y2="94" stroke="#585b70" stroke-width="1.2"/>
  <!-- Run key (highlighted) -->
  <rect x="463" y="94" width="120" height="30" fill="#313244" rx="4" stroke="#a6e3a1" stroke-width="2"/>
  <text x="523" y="114" text-anchor="middle" fill="#a6e3a1" font-size="12" font-weight="bold">Run</text>

  <!-- Values (entries in Run key) -->
  <!-- Line from Run down -->
  <line x1="523" y1="124" x2="523" y2="140" stroke="#585b70" stroke-width="1"/>
  <line x1="523" y1="140" x2="50" y2="140" stroke="#585b70" stroke-width="1"/>

  <!-- Entry 1: deepl -->
  <line x1="50" y1="140" x2="50" y2="155" stroke="#585b70" stroke-width="1"/>
  <line x1="50" y1="155" x2="70" y2="155" stroke="#585b70" stroke-width="1"/>
  <text x="74" y="159" fill="#89b4fa" font-size="10">deepl</text>
  <text x="130" y="159" fill="#585b70" font-size="10">= </text>
  <text x="144" y="159" fill="#cdd6f4" font-size="10">"C:\Program Files\DeepL\DeepL.exe"</text>

  <!-- Entry 2: OneDrive -->
  <line x1="50" y1="140" x2="50" y2="178" stroke="#585b70" stroke-width="1"/>
  <line x1="50" y1="178" x2="70" y2="178" stroke="#585b70" stroke-width="1"/>
  <text x="74" y="182" fill="#89b4fa" font-size="10">OneDrive</text>
  <text x="152" y="182" fill="#585b70" font-size="10">= </text>
  <text x="166" y="182" fill="#cdd6f4" font-size="10">"C:\Users\...\Microsoft\OneDrive\OneDrive.exe"</text>

  <!-- Entry 3: Discord -->
  <line x1="50" y1="140" x2="50" y2="201" stroke="#585b70" stroke-width="1"/>
  <line x1="50" y1="201" x2="70" y2="201" stroke="#585b70" stroke-width="1"/>
  <text x="74" y="205" fill="#89b4fa" font-size="10">Discord</text>
  <text x="130" y="205" fill="#585b70" font-size="10">= </text>
  <text x="144" y="205" fill="#cdd6f4" font-size="10">"C:\Users\...\Discord\Update.exe --processStart Discord.exe"</text>

  <!-- Label: her değer bir başlangıç programı -->
  <text x="330" y="232" text-anchor="middle" fill="#45475a" font-size="9" font-family="sans-serif">Her değer (value), sistemi açılışında çalıştırılacak bir programın adını ve yolunu tutar</text>
</svg>
