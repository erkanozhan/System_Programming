<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Consolas, 'Courier New', monospace">
  <rect width="700" height="230" fill="#1e1e2e" rx="8"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold" font-family="sans-serif">Cmdlet Parametre Anatomisi</text>

  <!-- Command text segments -->
  <!-- Set-ExecutionPolicy -->
  <text x="30" y="68" fill="#89b4fa" font-size="15" font-weight="bold">Set-ExecutionPolicy</text>
  <!-- RemoteSigned -->
  <text x="262" y="68" fill="#f9e2af" font-size="15" font-weight="bold">RemoteSigned</text>
  <!-- -Scope -->
  <text x="402" y="68" fill="#fab387" font-size="15" font-weight="bold">-Scope</text>
  <!-- CurrentUser -->
  <text x="474" y="68" fill="#f9e2af" font-size="15" font-weight="bold">CurrentUser</text>
  <!-- -Verbose -->
  <text x="594" y="68" fill="#a6e3a1" font-size="15" font-weight="bold">-Verbose</text>

  <!-- Underlines -->
  <line x1="30" y1="74" x2="248" y2="74" stroke="#89b4fa" stroke-width="2"/>
  <line x1="262" y1="74" x2="390" y2="74" stroke="#f9e2af" stroke-width="2"/>
  <line x1="402" y1="74" x2="462" y2="74" stroke="#fab387" stroke-width="2"/>
  <line x1="474" y1="74" x2="582" y2="74" stroke="#f9e2af" stroke-width="2"/>
  <line x1="594" y1="74" x2="680" y2="74" stroke="#a6e3a1" stroke-width="2"/>

  <!-- Vertical lines down to labels -->
  <line x1="139" y1="74" x2="139" y2="130" stroke="#89b4fa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="326" y1="74" x2="326" y2="130" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="432" y1="74" x2="432" y2="150" stroke="#fab387" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="528" y1="74" x2="528" y2="130" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="637" y1="74" x2="637" y2="130" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Label boxes and text -->
  <!-- Cmdlet adı -->
  <rect x="60" y="130" width="158" height="36" fill="#181825" rx="4" stroke="#89b4fa" stroke-width="1"/>
  <text x="139" y="145" text-anchor="middle" fill="#89b4fa" font-size="10" font-family="sans-serif" font-weight="bold">Cmdlet adı</text>
  <text x="139" y="159" text-anchor="middle" fill="#585b70" font-size="9" font-family="sans-serif">Verb-Noun</text>

  <!-- Konumsal parametre -->
  <rect x="244" y="130" width="164" height="36" fill="#181825" rx="4" stroke="#f9e2af" stroke-width="1"/>
  <text x="326" y="145" text-anchor="middle" fill="#f9e2af" font-size="10" font-family="sans-serif" font-weight="bold">Konumsal parametre</text>
  <text x="326" y="159" text-anchor="middle" fill="#585b70" font-size="9" font-family="sans-serif">(-ExecutionPolicy değeri)</text>

  <!-- Adlandırılmış parametre -->
  <rect x="366" y="150" width="132" height="36" fill="#181825" rx="4" stroke="#fab387" stroke-width="1"/>
  <text x="432" y="163" text-anchor="middle" fill="#fab387" font-size="10" font-family="sans-serif" font-weight="bold">Adlandırılmış</text>
  <text x="432" y="178" text-anchor="middle" fill="#fab387" font-size="10" font-family="sans-serif" font-weight="bold">parametre</text>

  <!-- Parametre değeri -->
  <rect x="454" y="130" width="148" height="36" fill="#181825" rx="4" stroke="#f9e2af" stroke-width="1"/>
  <text x="528" y="145" text-anchor="middle" fill="#f9e2af" font-size="10" font-family="sans-serif" font-weight="bold">Parametre değeri</text>
  <text x="528" y="159" text-anchor="middle" fill="#585b70" font-size="9" font-family="sans-serif">(-Scope'un değeri)</text>

  <!-- Anahtarlı parametre -->
  <rect x="572" y="130" width="130" height="36" fill="#181825" rx="4" stroke="#a6e3a1" stroke-width="1"/>
  <text x="637" y="145" text-anchor="middle" fill="#a6e3a1" font-size="10" font-family="sans-serif" font-weight="bold">Anahtarlı parametre</text>
  <text x="637" y="159" text-anchor="middle" fill="#585b70" font-size="9" font-family="sans-serif">(switch — değer almaz)</text>

  <!-- Bottom note -->
  <text x="350" y="210" text-anchor="middle" fill="#45475a" font-size="10" font-family="sans-serif">Konumsal parametrede -ExecutionPolicy adını yazmak zorunlu değil; PowerShell sırasından anlar.</text>
</svg>
