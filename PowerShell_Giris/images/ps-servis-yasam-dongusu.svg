<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 275" font-family="sans-serif">
  <rect width="640" height="275" fill="#1e1e2e" rx="8"/>

  <!-- Title -->
  <text x="320" y="26" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold">Servis Yaşam Döngüsü (Service Lifecycle)</text>

  <!-- Arrow marker defs -->
  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#a6e3a1"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#f38ba8"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#89b4fa"/>
    </marker>
    <marker id="arr-y" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#f9e2af"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#fab387"/>
    </marker>
  </defs>

  <!-- Stopped state -->
  <rect x="30" y="95" width="155" height="54" fill="#181825" rx="6" stroke="#f38ba8" stroke-width="2"/>
  <text x="107" y="117" text-anchor="middle" fill="#f38ba8" font-size="12" font-weight="bold">Stopped</text>
  <text x="107" y="136" text-anchor="middle" fill="#585b70" font-size="10">(Durdurulmuş)</text>

  <!-- Running state -->
  <rect x="390" y="95" width="155" height="54" fill="#181825" rx="6" stroke="#a6e3a1" stroke-width="2"/>
  <text x="467" y="117" text-anchor="middle" fill="#a6e3a1" font-size="12" font-weight="bold">Running</text>
  <text x="467" y="136" text-anchor="middle" fill="#585b70" font-size="10">(Çalışıyor)</text>

  <!-- Paused state -->
  <rect x="390" y="205" width="155" height="54" fill="#181825" rx="6" stroke="#f9e2af" stroke-width="2"/>
  <text x="467" y="227" text-anchor="middle" fill="#f9e2af" font-size="12" font-weight="bold">Paused</text>
  <text x="467" y="246" text-anchor="middle" fill="#585b70" font-size="10">(Duraklatılmış)</text>

  <!-- Restart-Service self-loop on Running (top arc) -->
  <path d="M 430 95 Q 410 48 467 48 Q 524 48 504 95" fill="none" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="467" y="36" text-anchor="middle" fill="#89b4fa" font-size="10" font-weight="bold">Restart-Service</text>

  <!-- Start-Service: Stopped -> Running (upper arc) -->
  <path d="M 185 108 Q 288 62 390 108" fill="none" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="288" y="72" text-anchor="middle" fill="#a6e3a1" font-size="10" font-weight="bold">Start-Service</text>

  <!-- Stop-Service: Running -> Stopped (lower arc) -->
  <path d="M 390 136 Q 288 180 185 136" fill="none" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="288" y="175" text-anchor="middle" fill="#f38ba8" font-size="10" font-weight="bold">Stop-Service</text>

  <!-- Suspend-Service: Running -> Paused (left side going down) -->
  <line x1="447" y1="149" x2="447" y2="205" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arr-y)"/>
  <text x="360" y="182" text-anchor="middle" fill="#f9e2af" font-size="9.5">Suspend-Service</text>

  <!-- Resume-Service: Paused -> Running (right side going up) -->
  <line x1="490" y1="205" x2="490" y2="149" stroke="#fab387" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="575" y="182" text-anchor="middle" fill="#fab387" font-size="9.5">Resume-Service</text>
</svg>
