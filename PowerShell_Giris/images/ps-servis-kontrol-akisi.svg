<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="sans-serif">
  <rect width="520" height="420" fill="#1e1e2e" rx="8"/>
  <text x="260" y="26" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold">Servis Kontrol Betiği — Akış Diyagramı</text>

  <defs>
    <marker id="fa" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#585b70"/>
    </marker>
  </defs>

  <!-- Start -->
  <circle cx="260" cy="50" r="20" fill="#a6e3a1"/>
  <text x="260" y="55" text-anchor="middle" fill="#1e1e2e" font-size="11" font-weight="bold">Başla</text>
  <line x1="260" y1="70" x2="260" y2="88" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>

  <!-- Get-Service -->
  <rect x="162" y="88" width="196" height="48" fill="#181825" rx="5" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="260" y="108" text-anchor="middle" fill="#89b4fa" font-size="11" font-weight="bold">Get-Service</text>
  <text x="260" y="126" text-anchor="middle" fill="#cdd6f4" font-size="10" font-family="monospace">-Name $serviceName</text>
  <line x1="260" y1="136" x2="260" y2="155" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>

  <!-- Decision diamond -->
  <polygon points="260,155 350,195 260,235 170,195" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="260" y="191" text-anchor="middle" fill="#f9e2af" font-size="10">Status ==</text>
  <text x="260" y="206" text-anchor="middle" fill="#f9e2af" font-size="10">"Running" ?</text>

  <!-- Left: Evet → Stop -->
  <line x1="170" y1="195" x2="92" y2="195" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>
  <text x="131" y="188" text-anchor="middle" fill="#a6e3a1" font-size="10" font-weight="bold">Evet</text>
  <line x1="92" y1="195" x2="92" y2="260" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>

  <!-- Stop-Service box -->
  <rect x="18" y="260" width="148" height="48" fill="#181825" rx="5" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="92" y="280" text-anchor="middle" fill="#f38ba8" font-size="11" font-weight="bold">Stop-Service</text>
  <text x="92" y="298" text-anchor="middle" fill="#cdd6f4" font-size="10" font-family="monospace">-Force</text>
  <line x1="92" y1="308" x2="92" y2="328" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>

  <!-- Write-Host left -->
  <rect x="18" y="328" width="148" height="42" fill="#181825" rx="5" stroke="#585b70" stroke-width="1"/>
  <text x="92" y="345" text-anchor="middle" fill="#cdd6f4" font-size="10">Write-Host</text>
  <text x="92" y="361" text-anchor="middle" fill="#585b70" font-size="9">"…durduruldu"</text>

  <!-- Right: Hayır → Start -->
  <line x1="350" y1="195" x2="428" y2="195" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>
  <text x="389" y="188" text-anchor="middle" fill="#f38ba8" font-size="10" font-weight="bold">Hayır</text>
  <line x1="428" y1="195" x2="428" y2="260" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>

  <!-- Start-Service box -->
  <rect x="354" y="260" width="148" height="48" fill="#181825" rx="5" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="428" y="280" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="bold">Start-Service</text>
  <text x="428" y="298" text-anchor="middle" fill="#cdd6f4" font-size="10" font-family="monospace">$serviceName</text>
  <line x1="428" y1="308" x2="428" y2="328" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>

  <!-- Write-Host right -->
  <rect x="354" y="328" width="148" height="42" fill="#181825" rx="5" stroke="#585b70" stroke-width="1"/>
  <text x="428" y="345" text-anchor="middle" fill="#cdd6f4" font-size="10">Write-Host</text>
  <text x="428" y="361" text-anchor="middle" fill="#585b70" font-size="9">"…başlatıldı"</text>

  <!-- Merge to end -->
  <line x1="92" y1="370" x2="92" y2="395" stroke="#585b70" stroke-width="1.2"/>
  <line x1="92" y1="395" x2="238" y2="395" stroke="#585b70" stroke-width="1.2"/>
  <line x1="428" y1="370" x2="428" y2="395" stroke="#585b70" stroke-width="1.2"/>
  <line x1="428" y1="395" x2="283" y2="395" stroke="#585b70" stroke-width="1.2"/>
  <line x1="260" y1="395" x2="260" y2="408" stroke="#585b70" stroke-width="1.2" marker-end="url(#fa)"/>

  <!-- End -->
  <circle cx="260" cy="410" r="8" fill="#f38ba8"/>
</svg>
