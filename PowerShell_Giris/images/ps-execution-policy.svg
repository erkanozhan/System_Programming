<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 230" font-family="sans-serif">
  <rect width="540" height="230" fill="#1e1e2e" rx="8"/>

  <text x="270" y="28" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold">Execution Policy Düzeyleri</text>

  <!-- Restricted -->
  <rect x="28" y="44" width="484" height="38" fill="#f38ba8" fill-opacity="0.08" rx="5" stroke="#f38ba8" stroke-width="1"/>
  <text x="48" y="66" fill="#f38ba8" font-size="12" font-weight="bold" font-family="monospace">Restricted</text>
  <text x="175" y="66" fill="#cdd6f4" font-size="11">Hiçbir betik çalışmaz — Windows varsayılanı</text>

  <!-- AllSigned -->
  <rect x="28" y="90" width="484" height="38" fill="#fab387" fill-opacity="0.08" rx="5" stroke="#fab387" stroke-width="1"/>
  <text x="48" y="112" fill="#fab387" font-size="12" font-weight="bold" font-family="monospace">AllSigned</text>
  <text x="175" y="112" fill="#cdd6f4" font-size="11">Yalnızca dijital imzalı betikler çalışır</text>

  <!-- RemoteSigned (highlighted as recommended) -->
  <rect x="28" y="136" width="484" height="38" fill="#a6e3a1" fill-opacity="0.12" rx="5" stroke="#a6e3a1" stroke-width="2"/>
  <text x="48" y="158" fill="#a6e3a1" font-size="12" font-weight="bold" font-family="monospace">RemoteSigned</text>
  <text x="175" y="158" fill="#cdd6f4" font-size="11">Yerel betikler serbest; uzaktan indirilenler imza ister</text>
  <text x="508" y="158" text-anchor="end" fill="#a6e3a1" font-size="10" font-weight="bold">← önerilen</text>

  <!-- Unrestricted -->
  <rect x="28" y="182" width="484" height="38" fill="#89b4fa" fill-opacity="0.08" rx="5" stroke="#89b4fa" stroke-width="1"/>
  <text x="48" y="204" fill="#89b4fa" font-size="12" font-weight="bold" font-family="monospace">Unrestricted</text>
  <text x="175" y="204" fill="#cdd6f4" font-size="11">Tüm betikler çalışır — üretim ortamı için önerilmez</text>
</svg>
