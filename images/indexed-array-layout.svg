<svg width="700" height="230" viewBox="0 0 700 230" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="230" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#2c3e50">İndisli Dizi Bellek Düzeni (Indexed Array Memory Layout)</text>
  <text x="350" y="38" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#7f8c8d">MEYVELER=("elma" "armut" "kiraz" "uzum" "mango" "nar")</text>

  <!-- Positive index labels above cells -->
  <text x="115" y="57" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#2980b9">[0]</text>
  <text x="205" y="57" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#2980b9">[1]</text>
  <text x="295" y="57" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#2980b9">[2]</text>
  <text x="385" y="57" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#2980b9">[3]</text>
  <text x="475" y="57" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#2980b9">[4]</text>
  <text x="565" y="57" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" fill="#e74c3c">[5]</text>

  <!-- Cell 0 -->
  <rect x="75" y="63" width="80" height="52" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="115" y="94" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#1e8449">"elma"</text>

  <!-- Cell 1 -->
  <rect x="165" y="63" width="80" height="52" rx="4" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="205" y="94" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#1a5276">"armut"</text>

  <!-- Cell 2 -->
  <rect x="255" y="63" width="80" height="52" rx="4" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="295" y="94" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#1a5276">"kiraz"</text>

  <!-- Cell 3 -->
  <rect x="345" y="63" width="80" height="52" rx="4" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="385" y="94" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#1a5276">"uzum"</text>

  <!-- Cell 4 -->
  <rect x="435" y="63" width="80" height="52" rx="4" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="475" y="94" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#1a5276">"mango"</text>

  <!-- Cell 5 — highlighted as last element -->
  <rect x="525" y="63" width="80" height="52" rx="4" fill="#fef9e7" stroke="#e67e22" stroke-width="2"/>
  <text x="565" y="94" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#d35400">"nar"</text>

  <!-- Negative index labels below cells -->
  <text x="115" y="130" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#bdc3c7">[-6]</text>
  <text x="205" y="130" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#bdc3c7">[-5]</text>
  <text x="295" y="130" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#bdc3c7">[-4]</text>
  <text x="385" y="130" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#bdc3c7">[-3]</text>
  <text x="475" y="130" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#bdc3c7">[-2]</text>
  <text x="565" y="130" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#e74c3c">[-1]</text>

  <!-- Slice highlight: [@]:1:3 covers cells 1,2,3 -->
  <rect x="163" y="61" width="264" height="56" rx="5" fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="295" y1="119" x2="295" y2="144" stroke="#8e44ad" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="295" y="156" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="10" fill="#8e44ad">${MEYVELER[@]:1:3}  →  "armut" "kiraz" "uzum"</text>

  <!-- Legend -->
  <rect x="28" y="170" width="644" height="50" rx="5" fill="#f2f3f4" stroke="#dee2e6" stroke-width="1"/>

  <rect x="44" y="182" width="12" height="12" rx="2" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="60" y="193" font-family="sans-serif" font-size="9" fill="#333">ilk eleman [0]</text>

  <rect x="148" y="182" width="12" height="12" rx="2" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="164" y="193" font-family="sans-serif" font-size="9" fill="#333">ara elemanlar</text>

  <rect x="258" y="182" width="12" height="12" rx="2" fill="#fef9e7" stroke="#e67e22" stroke-width="2"/>
  <text x="274" y="193" font-family="sans-serif" font-size="9" fill="#333">son eleman [5] / [-1]</text>

  <rect x="412" y="182" width="12" height="12" fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="428" y="193" font-family="sans-serif" font-size="9" fill="#333">dilim (slice) [@]:1:3</text>

  <text x="44" y="212" font-family="sans-serif" font-size="9" fill="#888">Pozitif indisler (mavi) soldan sağa, 0'dan başlar   ·   Negatif indisler (kırmızı) sağdan sola, -1'den başlar (Bash 4.3+)</text>
</svg>
