<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" font-family="monospace,sans-serif">
  <!-- Background -->
  <rect width="720" height="220" fill="#f8f9fa" rx="8"/>

  <!-- betik.sh -->
  <rect x="20" y="70" width="130" height="80" fill="#d0e8ff" stroke="#3a86c8" stroke-width="2" rx="6"/>
  <text x="85" y="102" text-anchor="middle" font-size="13" fill="#1a3a5c" font-weight="bold">betik.sh</text>
  <text x="85" y="120" text-anchor="middle" font-size="11" fill="#1a3a5c">#!/bin/bash</text>
  <text x="85" y="137" text-anchor="middle" font-size="11" fill="#444">echo "..."</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="110" x2="195" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="172" y="103" text-anchor="middle" font-size="10" fill="#555">çalıştır</text>

  <!-- Kernel box -->
  <rect x="196" y="65" width="140" height="90" fill="#ffe5cc" stroke="#d07020" stroke-width="2" rx="6"/>
  <text x="266" y="95" text-anchor="middle" font-size="13" fill="#6b3000" font-weight="bold">Çekirdek</text>
  <text x="266" y="113" text-anchor="middle" font-size="11" fill="#6b3000">(Kernel)</text>
  <text x="266" y="133" text-anchor="middle" font-size="10" fill="#888">shebang okur</text>
  <text x="266" y="148" text-anchor="middle" font-size="10" fill="#888">#! → /bin/bash</text>

  <!-- Arrow 2 -->
  <line x1="336" y1="110" x2="381" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="358" y="103" text-anchor="middle" font-size="10" fill="#555">başlatır</text>

  <!-- Bash box -->
  <rect x="382" y="65" width="140" height="90" fill="#d5f5d5" stroke="#2a8a2a" stroke-width="2" rx="6"/>
  <text x="452" y="95" text-anchor="middle" font-size="13" fill="#1a5c1a" font-weight="bold">/bin/bash</text>
  <text x="452" y="115" text-anchor="middle" font-size="11" fill="#1a5c1a">betiği okur</text>
  <text x="452" y="133" text-anchor="middle" font-size="10" fill="#444">sözdizimi</text>
  <text x="452" y="148" text-anchor="middle" font-size="10" fill="#444">denetler</text>

  <!-- Arrow 3 -->
  <line x1="522" y1="110" x2="567" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="544" y="103" text-anchor="middle" font-size="10" fill="#555">sırayla</text>

  <!-- Commands box -->
  <rect x="568" y="65" width="130" height="90" fill="#f0d5f0" stroke="#8a2a8a" stroke-width="2" rx="6"/>
  <text x="633" y="90" text-anchor="middle" font-size="12" fill="#4a005c" font-weight="bold">Komutlar</text>
  <text x="633" y="108" text-anchor="middle" font-size="11" fill="#4a005c">çalıştırılır</text>
  <text x="633" y="128" text-anchor="middle" font-size="10" fill="#666">echo, ls, cp</text>
  <text x="633" y="143" text-anchor="middle" font-size="10" fill="#666">if, for, ...</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="20" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Bash Betiğinin Çalışma Akışı</text>
  <text x="360" y="200" text-anchor="middle" font-size="11" fill="#888">Her betik çalıştırıldığında çekirdek shebang satırını okur ve uygun yorumlayıcıyı başlatır.</text>
</svg>
