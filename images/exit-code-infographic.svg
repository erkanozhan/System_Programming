<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node rect {
      stroke: #333;
      stroke-width: 2px;
      fill: #ddd;
    }
    .node text {
      font-family: sans-serif;
      font-size: 14px;
      fill: #333;
    }
    .edgePath path {
      stroke: #333;
      stroke-width: 1.5px;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .edgeLabel text {
      font-family: sans-serif;
      font-size: 12px;
      fill: #333;
    }
    .success-command rect { fill: #bbf; }
    .success-result rect { fill: #afa; }
    .failure-command rect { fill: #fbb; }
    .failure-result rect { fill: #faa; }
    .exit-code-box rect { fill: #ddd; }
  </style>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>

  <!-- Success Path -->
  <g class="node success-command" transform="translate(100, 50)">
    <rect x="-90" y="-20" width="180" height="40" rx="5" ry="5" />
    <text x="0" y="5" text-anchor="middle">Komut Çalıştır: ls /var/log</text>
  </g>
  <g class="edgePath">
    <path d="M 100 70 L 100 100" />
  </g>
  <g class="node exit-code-box" transform="translate(100, 120)">
    <rect x="-60" y="-20" width="120" height="40" rx="5" ry="5" />
    <text x="0" y="5" text-anchor="middle">Çıkış Kodu: $?</text>
  </g>
  <g class="edgePath">
    <path d="M 100 140 L 100 170" />
  </g>
  <g class="edgeLabel" transform="translate(100, 155)">
    <text x="0" y="0" text-anchor="middle">0 (Başarılı)</text>
  </g>
  <g class="node success-result" transform="translate(100, 190)">
    <rect x="-60" y="-20" width="120" height="40" rx="5" ry="5" />
    <text x="0" y="5" text-anchor="middle">echo $? -> 0</text>
  </g>

  <!-- Failure Path -->
  <g class="node failure-command" transform="translate(400, 50)">
    <rect x="-100" y="-20" width="200" height="40" rx="5" ry="5" />
    <text x="0" y="5" text-anchor="middle">Komut Çalıştır: ls /olmayan/dizin</text>
  </g>
  <g class="edgePath">
    <path d="M 400 70 L 400 100" />
  </g>
  <g class="node exit-code-box" transform="translate(400, 120)">
    <rect x="-60" y="-20" width="120" height="40" rx="5" ry="5" />
    <text x="0" y="5" text-anchor="middle">Çıkış Kodu: $?</text>
  </g>
  <g class="edgePath">
    <path d="M 400 140 L 400 170" />
  </g>
  <g class="edgeLabel" transform="translate(400, 155)">
    <text x="0" y="0" text-anchor="middle">2 (Başarısız)</text>
  </g>
  <g class="node failure-result" transform="translate(400, 190)">
    <rect x="-60" y="-20" width="120" height="40" rx="5" ry="5" />
    <text x="0" y="5" text-anchor="middle">echo $? -> 2</text>
  </g>
</svg>