<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 210" width="740" height="210" font-family="monospace,sans-serif">
  <rect width="740" height="210" fill="#f8f9fa" rx="8"/>
  <text x="370" y="26" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Boru Hattı (Pipe) — Komutları Zincirleme</text>

  <!-- cmd1 -->
  <rect x="20" y="70" width="130" height="70" fill="#d0e8ff" stroke="#3a86c8" stroke-width="2" rx="6"/>
  <text x="85" y="100" text-anchor="middle" font-size="12" fill="#1a3a5c" font-weight="bold">grep "ERROR"</text>
  <text x="85" y="118" text-anchor="middle" font-size="10" fill="#444">stdin: log.txt</text>
  <text x="85" y="132" text-anchor="middle" font-size="10" fill="#444">stdout → pipe</text>

  <!-- pipe 1 -->
  <rect x="158" y="97" width="50" height="16" fill="#888" rx="3"/>
  <text x="183" y="110" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">pipe |</text>
  <line x1="150" y1="105" x2="158" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="208" y1="105" x2="216" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- cmd2 -->
  <rect x="218" y="70" width="130" height="70" fill="#d5f5d5" stroke="#2a8a2a" stroke-width="2" rx="6"/>
  <text x="283" y="100" text-anchor="middle" font-size="12" fill="#1a5c1a" font-weight="bold">awk '{print $5}'</text>
  <text x="283" y="118" text-anchor="middle" font-size="10" fill="#444">stdin: pipe</text>
  <text x="283" y="132" text-anchor="middle" font-size="10" fill="#444">stdout → pipe</text>

  <!-- pipe 2 -->
  <rect x="356" y="97" width="50" height="16" fill="#888" rx="3"/>
  <text x="381" y="110" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">pipe |</text>
  <line x1="348" y1="105" x2="356" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="406" y1="105" x2="414" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- cmd3 -->
  <rect x="416" y="70" width="110" height="70" fill="#f0d5f0" stroke="#8a2a8a" stroke-width="2" rx="6"/>
  <text x="471" y="100" text-anchor="middle" font-size="12" fill="#4a005c" font-weight="bold">sort</text>
  <text x="471" y="118" text-anchor="middle" font-size="10" fill="#444">stdin: pipe</text>
  <text x="471" y="132" text-anchor="middle" font-size="10" fill="#444">stdout → pipe</text>

  <!-- pipe 3 -->
  <rect x="534" y="97" width="50" height="16" fill="#888" rx="3"/>
  <text x="559" y="110" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">pipe |</text>
  <line x1="526" y1="105" x2="534" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="584" y1="105" x2="592" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- cmd4 -->
  <rect x="594" y="70" width="120" height="70" fill="#ffe5cc" stroke="#d07020" stroke-width="2" rx="6"/>
  <text x="654" y="100" text-anchor="middle" font-size="12" fill="#6b3000" font-weight="bold">uniq -c</text>
  <text x="654" y="118" text-anchor="middle" font-size="10" fill="#444">stdin: pipe</text>
  <text x="654" y="132" text-anchor="middle" font-size="10" fill="#444">stdout → terminal</text>

  <!-- Full command label -->
  <rect x="20" y="160" width="700" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="370" y="180" text-anchor="middle" font-size="11" fill="#333" font-family="monospace">grep "ERROR" log.txt | awk '{print $5}' | sort | uniq -c</text>

  <defs>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
</svg>
