<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="300" fill="#f8f9fa" rx="10" />

  <!-- Code Block -->
  <g transform="translate(50, 50)">
    <rect width="250" height="150" fill="#212529" rx="5" />
    <text x="20" y="30" font-family="monospace" font-size="14" fill="#66d9ef">set</text>
    <text x="55" y="30" font-family="monospace" font-size="14" fill="#a6e22e">-x</text>
    
    <text x="20" y="60" font-family="monospace" font-size="14" fill="#f8f8f2">HESAP=$(( 5 * 12 ))</text>
    <text x="20" y="90" font-family="monospace" font-size="14" fill="#66d9ef">echo</text>
    <text x="65" y="90" font-family="monospace" font-size="14" fill="#e6db74">"Sonuc: $HESAP"</text>
  </g>

  <!-- Arrow -->
  <path d="M 320 125 L 380 125" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow-grey)" />

  <!-- Magnifying Glass / Output Block -->
  <g transform="translate(410, 50)">
    <!-- Glass effect -->
    <rect width="340" height="150" fill="#e7f5ff" stroke="#339af0" stroke-width="3" rx="15" />
    <circle cx="0" cy="0" r="20" fill="#339af0" opacity="0.2" />
    <path d="M 330 140 L 350 160" stroke="#339af0" stroke-width="8" stroke-linecap="round" />
    
    <text x="20" y="40" font-family="monospace" font-size="14" fill="#495057">+ HESAP=60</text>
    <text x="20" y="70" font-family="monospace" font-size="14" fill="#495057">+ echo 'Sonuc: 60'</text>
    <text x="20" y="100" font-family="monospace" font-size="14" font-weight="bold" fill="#000000">Sonuc: 60</text>
    
    <text x="20" y="130" font-family="sans-serif" font-size="12" fill="#868e96" font-style="italic">"Değişkenlerin çalışma anındaki değerleri görülür"</text>
  </g>

  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
    </marker>
  </defs>
</svg>