<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 300" width="740" height="300" font-family="sans-serif">
  <rect width="740" height="300" fill="#f8f9fa" rx="10"/>
  <text x="370" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Değişken Kapsamı (Variable Scope): Küresel vs. Yerel</text>
  
  <!-- Global Environment -->
  <rect x="40" y="60" width="660" height="220" fill="#e8f4f8" stroke="#3498db" stroke-width="2" rx="8"/>
  <text x="60" y="90" font-size="16" font-weight="bold" fill="#2980b9">Küresel Kapsam (Global Scope)</text>
  <text x="60" y="115" font-size="14" fill="#333">Tüm betik boyunca erişilebilir.</text>
  
  <rect x="60" y="130" width="160" height="40" fill="#fff" stroke="#bdc3c7" rx="4"/>
  <text x="140" y="155" text-anchor="middle" font-size="14" fill="#c0392b" font-family="monospace">SAYAC = 10</text>
  
  <!-- Local Function Environment -->
  <rect x="300" y="100" width="380" height="160" fill="#fdf2e9" stroke="#e67e22" stroke-width="2" rx="8" stroke-dasharray="6,4"/>
  <text x="320" y="130" font-size="16" font-weight="bold" fill="#d35400">Fonksiyon İçi (Local Scope)</text>
  <text x="320" y="155" font-size="14" fill="#333">Sadece bu izole alanda geçerlidir.</text>
  
  <rect x="320" y="180" width="160" height="40" fill="#fff" stroke="#bdc3c7" rx="4"/>
  <text x="400" y="205" text-anchor="middle" font-size="14" fill="#27ae60" font-family="monospace">local SAYAC = 99</text>
  
  <path d="M 220 150 Q 260 150 280 180 T 320 200" fill="none" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
  <text x="265" y="165" font-size="12" fill="#c0392b" font-weight="bold">local YOKSA ezer!</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>
