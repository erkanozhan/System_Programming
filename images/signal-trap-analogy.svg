<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" rx="10" />

  <!-- Normal Execution Path -->
  <g transform="translate(50, 100)">
    <rect width="600" height="60" fill="#e9ecef" rx="5" />
    <text x="300" y="35" font-family="monospace" font-size="20" text-anchor="middle" fill="#495057">Normal İşleyiş (Normal Flow)</text>
    <path d="M 100 60 L 100 80 L 500 80 L 500 60" fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="5,5" />
  </g>

  <!-- Signal Trigger -->
  <g transform="translate(300, 20)">
    <circle cx="50" cy="50" r="40" fill="#ff6b6b" />
    <path d="M 40 30 L 60 30 L 55 60 L 45 60 Z" fill="white" />
    <circle cx="50" cy="75" r="5" fill="white" />
    <text x="100" y="55" font-family="sans-serif" font-weight="bold" font-size="24" fill="#fa5252">SİNYAL (Örn: SIGINT / Ctrl+C)</text>
    <path d="M 50 90 L 50 140" fill="none" stroke="#ff6b6b" stroke-width="4" marker-end="url(#arrow-red)" />
  </g>

  <!-- Trap Execution -->
  <g transform="translate(150, 240)">
    <rect width="500" height="120" fill="#d3f9d8" stroke="#40c057" stroke-width="2" rx="10" />
    <text x="250" y="35" font-family="sans-serif" font-weight="bold" font-size="22" text-anchor="middle" fill="#2b8a3e">TRAP: Temizlik Rutini</text>
    
    <g transform="translate(50, 60)">
      <rect width="100" height="40" fill="#fff" stroke="#8ce99a" stroke-width="2" rx="5"/>
      <text x="50" y="25" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#2b8a3e">Ocağı Kapat</text>
    </g>

    <path d="M 160 80 L 190 80" fill="none" stroke="#2b8a3e" stroke-width="3" marker-end="url(#arrow-green)" />

    <g transform="translate(200, 60)">
      <rect width="100" height="40" fill="#fff" stroke="#8ce99a" stroke-width="2" rx="5"/>
      <text x="50" y="25" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#2b8a3e">Dosyaları Sil</text>
    </g>

    <path d="M 310 80 L 340 80" fill="none" stroke="#2b8a3e" stroke-width="3" marker-end="url(#arrow-green)" />

    <g transform="translate(350, 60)">
      <rect width="100" height="40" fill="#ffc9c9" stroke="#ff8787" stroke-width="2" rx="5"/>
      <text x="50" y="25" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#c92a2a">Güvenli Çıkış</text>
    </g>
  </g>

  <!-- Arrow Definitions -->
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b6b" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
    </marker>
  </defs>

</svg>