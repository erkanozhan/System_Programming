<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 250" width="740" height="250" font-family="sans-serif">
  <rect width="740" height="250" fill="#f4f6f8" rx="8"/>
  
  <text x="370" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Dosya Tanımlayıcıları (File Descriptors) Tesisat Analojisi</text>

  <rect x="270" y="80" width="200" height="100" fill="#d9e2ec" stroke="#5c6f84" stroke-width="3" rx="10"/>
  <text x="370" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#102a43">Çalışan Süreç</text>
  <text x="370" y="150" text-anchor="middle" font-size="12" fill="#334e68">(Process)</text>

  <rect x="40" y="110" width="130" height="40" fill="#b7eb8f" stroke="#388e3c" stroke-width="2" rx="4"/>
  <text x="105" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">Klavye (0)</text>
  <line x1="170" y1="130" x2="260" y2="130" stroke="#388e3c" stroke-width="6" marker-end="url(#arrowG)"/>
  <text x="215" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">stdin</text>
  <text x="215" y="145" text-anchor="middle" font-size="10" fill="#388e3c">Temiz Su Girişi</text>

  <rect x="570" y="70" width="130" height="40" fill="#bae3ff" stroke="#1c64f2" stroke-width="2" rx="4"/>
  <text x="635" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#0c326f">Ekran (1)</text>
  <line x1="470" y1="90" x2="560" y2="90" stroke="#1c64f2" stroke-width="6" marker-end="url(#arrowB)"/>
  <text x="515" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#1c64f2">stdout</text>
  <text x="515" y="105" text-anchor="middle" font-size="10" fill="#1c64f2">İşlenmiş Su Çıkışı</text>

  <rect x="570" y="150" width="130" height="40" fill="#ffbaba" stroke="#e02424" stroke-width="2" rx="4"/>
  <text x="635" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#610404">Ekran/Log (2)</text>
  <line x1="470" y1="170" x2="560" y2="170" stroke="#e02424" stroke-width="6" marker-end="url(#arrowR)"/>
  <text x="515" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#e02424">stderr</text>
  <text x="515" y="185" text-anchor="middle" font-size="10" fill="#e02424">Atık / Hata Sızıntısı</text>

  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#388e3c"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1c64f2"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#e02424"/>
    </marker>
  </defs>
</svg>