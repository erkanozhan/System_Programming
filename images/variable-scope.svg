<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320" font-family="monospace,sans-serif">
  <rect width="700" height="320" fill="#f8f9fa" rx="8"/>
  <text x="350" y="26" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Değişken Kapsamı (Variable Scope)</text>

  <!-- Global scope box -->
  <rect x="30" y="45" width="640" height="245" fill="#fff8e8" stroke="#c8a020" stroke-width="2" rx="10"/>
  <text x="55" y="70" font-size="12" fill="#6b4c00" font-weight="bold">Global Kapsam</text>
  <text x="55" y="88" font-size="11" fill="#888">(betik boyunca görünür)</text>

  <!-- Global vars -->
  <rect x="55" y="100" width="160" height="30" fill="#ffe8a0" stroke="#c8a020" stroke-width="1" rx="4"/>
  <text x="135" y="120" text-anchor="middle" font-size="12" fill="#6b4c00">GLOBAL="deger"</text>

  <rect x="55" y="140" width="160" height="30" fill="#ffe8a0" stroke="#c8a020" stroke-width="1" rx="4"/>
  <text x="135" y="160" text-anchor="middle" font-size="12" fill="#6b4c00">X=10</text>

  <!-- Function 1 box -->
  <rect x="280" y="95" width="160" height="120" fill="#e8f0ff" stroke="#2255aa" stroke-width="2" rx="8"/>
  <text x="360" y="118" text-anchor="middle" font-size="12" fill="#1a3a8a" font-weight="bold">fonksiyon_a()</text>
  <rect x="298" y="128" width="125" height="28" fill="#b8d0ff" stroke="#2255aa" stroke-width="1" rx="4"/>
  <text x="360" y="147" text-anchor="middle" font-size="11" fill="#1a3a8a">local X=99</text>
  <text x="360" y="175" text-anchor="middle" font-size="10" fill="#555">X görünür: 99</text>
  <text x="360" y="190" text-anchor="middle" font-size="10" fill="#555">GLOBAL görünür: deger</text>
  <text x="360" y="205" text-anchor="middle" font-size="10" fill="#cc2222">Y görünmez</text>

  <!-- Function 2 box -->
  <rect x="490" y="95" width="160" height="120" fill="#e8f5e8" stroke="#2a8a2a" stroke-width="2" rx="8"/>
  <text x="570" y="118" text-anchor="middle" font-size="12" fill="#1a5c1a" font-weight="bold">fonksiyon_b()</text>
  <rect x="508" y="128" width="125" height="28" fill="#b8e8b8" stroke="#2a8a2a" stroke-width="1" rx="4"/>
  <text x="570" y="147" text-anchor="middle" font-size="11" fill="#1a5c1a">local Y="yerel"</text>
  <text x="570" y="175" text-anchor="middle" font-size="10" fill="#555">X görünür: 10 (global)</text>
  <text x="570" y="190" text-anchor="middle" font-size="10" fill="#555">GLOBAL görünür: deger</text>
  <text x="570" y="205" text-anchor="middle" font-size="10" fill="#cc2222">local X görünmez</text>

  <!-- Arrows from global to functions -->
  <line x1="215" y1="130" x2="278" y2="140" stroke="#c8a020" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrY)"/>
  <line x1="215" y1="155" x2="488" y2="145" stroke="#c8a020" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrY)"/>

  <!-- Note at bottom -->
  <text x="350" y="255" text-anchor="middle" font-size="11" fill="#555">local olmayan değişkenler fonksiyon içinde global kapsamı değiştirir.</text>
  <text x="350" y="273" text-anchor="middle" font-size="11" fill="#cc2222">Fonksiyonlarda her zaman local kullanın.</text>

  <defs>
    <marker id="arrY" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c8a020"/>
    </marker>
  </defs>
</svg>
