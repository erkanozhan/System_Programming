<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 580" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555" />
    </marker>
  </defs>
  <style>
    .bg { fill: #f8f9fa; rx: 10; ry: 10; }
    .box-start { fill: #ebf5fb; stroke: #1abc9c; stroke-width: 2; rx: 20; ry: 20; }
    .box-err { fill: #fdf2e9; stroke: #e74c3c; stroke-width: 2; rx: 5; ry: 5; }
    .box-success { fill: #eafaf1; stroke: #2ecc71; stroke-width: 2; rx: 5; ry: 5; }
    .decision { fill: #fef9e7; stroke: #f39c12; stroke-width: 2; }
    .text { font-size: 14px; fill: #2c3e50; text-anchor: middle; dominant-baseline: central; }
    .text-bold { font-size: 14px; font-weight: bold; fill: #2c3e50; text-anchor: middle; dominant-baseline: central; }
    .label { font-size: 12px; fill: #7f8c8d; font-weight: bold; }
    .line { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  
  <rect width="100%" height="100%" class="bg" />

  <text x="300" y="30" font-size="18px" font-weight="bold" fill="#2c3e50" text-anchor="middle">Bash: if / elif / else Notlandırma Akışı</text>

  <rect x="80" y="60" width="140" height="40" class="box-start" />
  <text x="150" y="80" class="text-bold">Not Girişi (NOT)</text>
  
  <polygon points="150,120 220,140 150,160 80,140" class="decision"/>
  <text x="150" y="140" class="text">Sayısal mı?</text>
  <rect x="380" y="120" width="140" height="40" class="box-err" />
  <text x="450" y="140" class="text">Hata: Geçersiz Sayı</text>

  <polygon points="150,200 220,220 150,240 80,220" class="decision"/>
  <text x="150" y="220" class="text">NOT &gt;= 90?</text>
  <rect x="380" y="200" width="140" height="40" class="box-success" />
  <text x="450" y="220" class="text-bold">AA - Mükemmel</text>

  <polygon points="150,280 220,300 150,320 80,300" class="decision"/>
  <text x="150" y="300" class="text">NOT &gt;= 80?</text>
  <rect x="380" y="280" width="140" height="40" class="box-success" />
  <text x="450" y="300" class="text-bold">BA - İyi</text>

  <polygon points="150,360 220,380 150,400 80,380" class="decision"/>
  <text x="150" y="380" class="text">NOT &gt;= 70?</text>
  <rect x="380" y="360" width="140" height="40" class="box-success" />
  <text x="450" y="380" class="text-bold">BB - Orta</text>

  <polygon points="150,440 220,460 150,480 80,460" class="decision"/>
  <text x="150" y="460" class="text">NOT &gt;= 60?</text>
  <rect x="380" y="440" width="140" height="40" class="box-success" />
  <text x="450" y="460" class="text-bold">CB - Geçer</text>

  <rect x="80" y="520" width="140" height="40" class="box-err" />
  <text x="150" y="540" class="text-bold">FF - Başarısız</text>

  <path d="M150,100 L150,120" class="line" />
  <path d="M220,140 L380,140" class="line" /><text x="300" y="130" class="label">Hayır (!=~^[0-9]+$)</text>
  <path d="M150,160 L150,200" class="line" /><text x="165" y="180" class="label">Evet</text>
  <path d="M220,220 L380,220" class="line" /><text x="300" y="210" class="label">Evet</text>
  <path d="M150,240 L150,280" class="line" /><text x="165" y="260" class="label">Hayır</text>
  <path d="M220,300 L380,300" class="line" /><text x="300" y="290" class="label">Evet</text>
  <path d="M150,320 L150,360" class="line" /><text x="165" y="340" class="label">Hayır</text>
  <path d="M220,380 L380,380" class="line" /><text x="300" y="370" class="label">Evet</text>
  <path d="M150,400 L150,440" class="line" /><text x="165" y="420" class="label">Hayır</text>
  <path d="M220,460 L380,460" class="line" /><text x="300" y="450" class="label">Evet</text>
  <path d="M150,480 L150,520" class="line" /><text x="165" y="500" class="label">Hayır</text>
</svg>